services:
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    container_name: fashop_backend
    volumes:
      - ./backend:/app
      - backend_static:/app/static
    environment:
      - APP_NAME=${APP_NAME:-FastAPI Shop}
      - DEBUG=${DEBUG:-False}
      - DATABASE_URL=sqlite:///./shop.db
      - CORS_ORIGINS=http://${DOMAIN:-localhost},https://www.${DOMAIN:-localhost},http://localhost:5173
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - fashop_network
  
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://${DOMAIN:-localhost}/api
    container_name: fashop_frontend
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - fashop_network
  
  nginx:
    image: nginx:alpine
    container_name: fashop_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/app/backend/static:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - fashop_network
  
  certbot:
    image: certbot/certbot
    container_name: fashop_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - fashop_network

networks:
  fashop_network:
    driver: bridge

volumes:
  backend_static: